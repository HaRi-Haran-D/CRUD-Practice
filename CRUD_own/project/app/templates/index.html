{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
    <main>
        <form action="" method="post">
            {% csrf_token %}
            {% for item in form %}
            <label for="">{{ item.label_tag }}</label>
            <p>{{ item }}</p>
            {% endfor %}
            <button type="submit">Save</button>
        </form>
        <a href="{% url 'list' %}">Employees</a>
    </main>
{% endblock %}
