{% extends 'base.html' %}
{% block title %}Update{% endblock %}
{% block content %}
    <div>
        <form action="" method="post">
            {% csrf_token %}
            {% for item in form %}
            <label for="">{{ item.label_tag }}</label>
            <p>{{ item }}</p>
            {% endfor %}
            <button type="submit">Update</button>
            <a href="{% url 'home' %}">Back to Home</a>
        </form>
    </div>
{% endblock %}
