<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0px;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            background-color: gray;
            height: 30px;
            padding: 15px
        }

        .nav-bar h2 {
            margin: 0px;
        }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div>
            <h2>Title</h2>
        </div>
        <div>
            <a href="">Home</a>
            <a href="">Contact</a>
            <a href="">About</a>
        </div>
    </nav>
    {% if messages %}
    {% for message in messages %}
        <div>
            <p>{{ message }}</p>
        </div>
    {% endfor %}
    {% endif %}

    {% block content %}
    {% endblock %}
</body>
</html>
