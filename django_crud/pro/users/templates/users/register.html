{% extends 'users/base.html' %}
{% block title %}SignUp{% endblock %}
{% block content %}
    <div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
        <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8">
            <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">Sign Up</h2>
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div class="space-y-3">
                    {{ form.as_p }}
                </div>
                <button type="submit"
                    class="w-1/2 block mx-auto bg-gray-500 text-white py-2 rounded-lg font-semibold hover:bg-gray-600 transition duration-300">
                    Register
                </button>
            </form>
            <p class="text-sm text-gray-500 text-center mt-4">
                Already have an account?
                <a href="{% url 'users:login' %}" class="text-indigo-500 hover:underline">Login</a>
            </p>
        </div>
    </div>
{% endblock %}
