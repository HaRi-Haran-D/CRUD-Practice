{% extends 'home/base.html' %}
{% block title %}Post{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto mt-5 mb-4 space-y-6 px-4">
    {% for post in posts %}
    <div class="bg-white shadow-md rounded-xl overflow-hidden hover:shadow-lg transition duration-300">
        <div class="flex flex-col md:flex-row">
            <div class="md:w-1/3">
                <img src="{{ post.image.url }}" alt="" class="w-full h-48 md:h-56 object-cover rounded-lg">
            </div>
            <div class="p-5 md:w-2/3 flex flex-col justify-between">
                <div>
                    <p class="text-sm text-gray-500 mb-1">
                        <a href="{% url 'home:profile' post.name.username %}">{{ post.name.username }}</a>
                    </p>
                    <h3 class="text-xl font-semibold text-gray-800 mb-2">
                        {{ post.title }}
                    </h3>
                    <p class="text-gray-600 text-sm line-clamp-3">
                        {{ post.para }}
                    </p>
                </div>
                <div class="mt-4 flex items-center justify-between">
                    <p class="text-xs text-gray-400">
                        {{ post.date }}
                    </p>
                    {% comment %} <a href="#"
                       class="text-indigo-500 text-sm font-medium hover:underline">
                        Read more →
                    </a> {% endcomment %}
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
