{% extends 'home/base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
<div class="max-w-lg max-h-1/2 mx-auto mt-2 px-4">
    <div class="bg-white shadow-2xl rounded-xl p-6">
        <h2 class="text-2xl text-center font-bold text-gray-800 mb-2">Create Blog</h2>
        <form method="post" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Title</label>
                {{ form.title }}
            </div>
            <div class="max-h-[250px]">
                <label class="block text-sm font-medium text-gray-600 mb-1">Para</label>
                {{ form.para }}
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">Image</label>
                {{ form.image }}
            </div>
            <button type="submit" class="w-auto bg-gray-500 block m-auto text-white py-2 px-5 rounded-lg hover:bg-gray-600 transition duration-300">
                Submit
            </button>
        </form>
    </div>
</div>
{% endblock %}
