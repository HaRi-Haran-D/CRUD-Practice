<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <form action="" method="post">
            {% csrf_token %}
            <table>
            {% for forms in form %}
            
            <tr>
                <td>
                    {{ forms.label_tag }}
                </td>
                <td>
                    {{ forms }}
                </td>
            </tr>
            {% endfor %}
            </table>
            <button type="submit">Add</button>
        </form>
    </div>
</body>
</html>
