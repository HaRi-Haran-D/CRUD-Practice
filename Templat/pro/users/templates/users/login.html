{% extends 'app/base.html' %}
{% block content %}
<div class="flex flex-col justify-center items-center min-h-screen p-10">
    <form class="shadow-lg p-10 rounded-xl space-y-5" method="post">
        <div>
            <h2 class="text-4xl text-center font-bold">Login</h2>
        </div>
        {% csrf_token %}

        {% if form.non_field_errors %}
        <div class="bg-red-500 text-white p-2 rounded-lg">
            {% for error in form.non_field_errors %}

            <p>{{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}
        <div>
            <label for="">Username</label>
            <div class="border rounded">
                {{ form.username }}
            </div>
        </div>
        <div>
            <label for="">Password</label>
            <div class="border rounded">
                {{ form.password }}
            </div>
        </div>
        
        <button class="m-3 block text-white mx-auto bg-gray-400 px-4 py-2 w-25 rounded-lg hover:bg-gray-500" type="submit">Submit</button>
    </form>
</div>
{% endblock %}
