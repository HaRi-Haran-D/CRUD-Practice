{% extends 'app/base.html' %}
{% block content %}
<div class="flex flex-col justify-center items-center min-h-full p-10">
    <form class="shadow-lg w-100 p-5 px-10 rounded-xl space-y-5" method="post">
        {% csrf_token %}
        <div>
            <h2 class="text-4xl text-center font-bold">Update Item</h2>
        </div>
        {% for field in form %}
        <div>
            <label class="text-bold" for="">{{field.label}}</label>
            <div class="border rounded">{{ field }}</div>
        </div>
        {% endfor %}
        <button class="mt-1 block text-white mx-auto bg-gray-400 px-4 py-2 w-25 rounded-lg hover:bg-gray-500" type="submit">Update</button>
    </form>
</div>    
{% endblock %}
